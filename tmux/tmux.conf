# Prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# General
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g mode-keys vi
set -g history-limit 50000

# Status and borders
set -g status on
set -g status-position bottom
set -g status-style "bg=#000000,fg=#f8f8f0"
set -g message-style "bg=#1E1E1E,fg=#ffffff"
set -g pane-border-style "fg=#444444"
set -g pane-active-border-style "fg=#40c4ff"

# Pane number shown at bottom left of each pane
set -g pane-border-status bottom
set -g pane-border-format " #{pane_index} "

# Windows
bind c new-window -c "#{pane_current_path}"
bind 1 select-window -t :1
bind 2 select-window -t :2
bind 3 select-window -t :3
bind 4 select-window -t :4
bind 5 select-window -t :5
bind 6 select-window -t :6
bind 7 select-window -t :7
bind 8 select-window -t :8
bind 9 select-window -t :9

# Splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Pane movement with Ctrl-a + arrow
bind Left select-pane -L
bind Right select-pane -R
bind Up select-pane -U
bind Down select-pane -D

# Pane resizing with Ctrl-a + Shift + arrow
bind -r S-Left resize-pane -L 12
bind -r S-Right resize-pane -R 12
bind -r S-Up resize-pane -U 6
bind -r S-Down resize-pane -D 6

# Also keep vi style pane movement
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 12
bind -r J resize-pane -D 6
bind -r K resize-pane -U 6
bind -r L resize-pane -R 12

# Pane swapping
bind { swap-pane -U
bind } swap-pane -D

# Show pane numbers, then press the number to jump
bind q display-panes

# Useful extras
bind z resize-pane -Z
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"
